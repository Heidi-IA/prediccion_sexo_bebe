<!DOCTYPE html>
<html>
<head>
    <title>Eneagrama Manual</title>
</head>
<body>

<h2>Generador de Eneagrama</h2>

<form method="POST">

    <label>Modelo:</label>
    <select name="modelo">
        <option value="integral">Integral</option>
        <option value="esencial">Esencial</option>
    </select>

    <br><br>

    <label>Nombre:</label>
    <input type="text" name="nombre">

    <br><br>

    <label>Email:</label>
    <input type="email" name="email">

    <br><br>

    <h3>Porcentajes</h3>

    {% for i in range(1,10) %}
        Tipo {{i}}: <input type="number" name="t{{i}}" step="0.1"><br>
    {% endfor %}

    <br>

    <button type="submit">Generar PDF</button>

</form>

</body>
</html>
